<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — TranspoBot IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            /* DARK MODE */
            --bg: #0B0F1A; --bg2: #111827; --bg3: #1a2235;
            --blue: #2563EB; --blue2: #3B82F6; --accent: #38BDF8;
            --text: #F1F5F9; --muted: #64748B; --border: #1E293B; --card: #141D2E;
            --radius: 16px;
        }
        .light {
            /* LIGHT MODE */
            --bg: #F0F4FA; --bg2: #FFFFFF; --bg3: #E8EEF8;
            --blue: #2563EB; --blue2: #3B82F6; --accent: #0284C7;
            --text: #0F172A; --muted: #64748B; --border: #CBD5E1; --card: #FFFFFF;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* Ambient Blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            opacity: 0.15;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob.b1 { top: -10%; left: -10%; width: 400px; height: 400px; background: var(--blue2); }
        .blob.b2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: var(--accent); animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 30px) scale(1.1); }
        }

        /* Container */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 2rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, var(--blue), var(--accent));
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.3);
        }
        .title { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 800; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: var(--muted); }

        .input-group { margin-bottom: 1.2rem; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .c-input {
            width: 100%;
            background: var(--bg3);
            border: 1.5px solid var(--border);
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
            outline: none;
        }
        .c-input:focus { border-color: var(--blue2); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .c-input::placeholder { color: var(--muted); }

        .btn-submit {
            width: 100%;
            background: var(--blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-submit:hover { background: var(--blue2); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3); }
        .btn-submit:active { transform: translateY(0); }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #EF4444; padding: 10px 14px; border-radius: 10px; font-size: 12px; font-weight: 500;
            margin-bottom: 1rem; display: none; text-align: center;
        }

        .footer-links { margin-top: 1.5rem; text-align: center; font-size: 13px; }
        .footer-links a { color: var(--muted); text-decoration: none; transition: color 0.2s; }
        .footer-links a:hover { color: var(--blue2); }

        /* Theme Toggle Top Right */
        .theme-toggle-btn {
            position: absolute; top: 20px; right: 20px;
            width: 44px; height: 44px; border-radius: 12px; background: var(--card);
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; color: var(--text); z-index: 20; transition: all 0.3s;
        }
        .theme-toggle-btn:hover { border-color: var(--blue2); color: var(--blue2); }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .login-wrap { padding: 1rem; }
            .login-card { padding: 2rem 1.5rem; }
            .blob { opacity: 0.1; }
        }
    </style>
</head>
<body id="app-body">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    
    <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn" title="Basculer le thème">🌙</button>

    <div class="login-wrap">
        <div class="login-card">
            <div class="header">
                <div class="logo-icon">🚌</div>
                <h1 class="title">TranspoBot</h1>
                <p class="subtitle">Connexion à votre espace d'administration AI</p>
            </div>

            <div id="error-message" class="error-msg">Identifiants incorrects</div>

            <form id="login-form">
                <div class="input-group">
                    <label>Identifiant</label>
                    <input type="text" class="c-input" id="username" placeholder="Entrez votre nom d'utilisateur" required>
                </div>
                <div class="input-group">
                    <label>Mot de passe</label>
                    <input type="password" class="c-input" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit" id="login-btn">
                    <span id="btn-text">Se connecter</span> <span>➔</span>
                </button>
            </form>

            <div class="footer-links">
                <a href="#">Mot de passe oublié ?</a> • <a href="#">Aide</a>
            </div>
        </div>
    </div>

    <script>
        let isLight = false;
        // Check local storage for theme
        if (localStorage.getItem('theme') === 'light') toggleTheme(true);

        function toggleTheme(forceLight = null) {
            isLight = forceLight !== null ? forceLight : !isLight;
            document.documentElement.classList.toggle('light', isLight);
            document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        const form = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const btnText = document.getElementById('btn-text');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            btnText.innerHTML = 'Connexion en cours...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('tb_token', data.token);
                    localStorage.setItem('tb_user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    showError(data.detail || 'Identifiants incorrects');
                }
            } catch (error) {
                showError('Erreur de réseau. Le serveur est-il allumé ?');
            } finally {
                loginBtn.disabled = false;
                btnText.textContent = 'Se connecter';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            setTimeout(() => { errorMessage.style.display = 'none'; }, 4000);
        }
    </script>
</body>
</html>
