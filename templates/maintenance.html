<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TranspoBot — Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0B0F1A;--bg2:#111827;--bg3:#1a2235;--bg4:#0d1526;
  --blue:#2563EB;--blue2:#3B82F6;--accent:#38BDF8;
  --green:#22C55E;--orange:#F59E0B;--red:#EF4444;
  --text:#F1F5F9;--muted:#64748B;--border:#1E293B;--card:#141D2E;
  --radius:14px;
}
.light{
  --bg:#F0F4FA;--bg2:#FFFFFF;--bg3:#E8EEF8;--bg4:#F8FAFF;
  --blue:#2563EB;--blue2:#3B82F6;--accent:#0284C7;
  --green:#16A34A;--orange:#D97706;--red:#DC2626;
  --text:#0F172A;--muted:#64748B;--border:#CBD5E1;--card:#FFFFFF;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}

/* ===== LAYOUT ===== */
.app{display:grid;grid-template-columns:64px 1fr;grid-template-rows:58px 1fr;height:100vh;overflow:hidden;}

/* ===== SIDEBAR ===== */
.sidebar{
  grid-row:1/3;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:6px;
  transition:background .3s;z-index:20;
}
.logo-icon{width:40px;height:40px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:16px;flex-shrink:0;cursor:pointer;}
.nav-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--muted);border:none;background:none;transition:all .2s;position:relative;}
.nav-btn:hover{background:var(--bg3);color:var(--blue2);}
.nav-btn.active{background:var(--bg3);color:var(--blue2);box-shadow:0 0 0 1.5px var(--blue2)40;}
.nav-btn .tooltip{position:absolute;left:52px;background:#1e293b;color:#f1f5f9;font-size:11px;padding:4px 10px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;}
.nav-btn:hover .tooltip{opacity:1;}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px;}
.theme-toggle{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.theme-toggle:hover{background:var(--blue);border-color:var(--blue);color:white;}
.user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#38BDF8);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:white;}

/* ===== TOPBAR ===== */
.topbar{
  grid-column:2;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 22px;gap:16px;transition:background .3s;
}
.app-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.app-sub{font-size:11px;color:var(--muted);margin-left:2px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.live-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:var(--bg3);padding:5px 12px;border-radius:999px;border:1px solid var(--green)40;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.icon-btn{width:36px;height:36px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* ===== MAIN CONTENT ===== */
.main{grid-column:2;display:flex;flex-direction:column;overflow-y:auto;padding:24px;padding-bottom:100px;scroll-behavior:smooth;}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);font-weight:600;margin-bottom:12px;}

/* MAINTENANCE GRID */
.maint-summary{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:14px; margin-bottom:24px;}
.msum{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center; transition:transform 0.2s;}
.msum:hover{transform:translateY(-2px);}
.msum-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800; min-height: 32px;}
.msum-lbl{font-size:12px;color:var(--muted);margin-top:4px; font-weight: 500;}

.maint-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:16px;}
.mcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:border-color .2s; animation: fadeIn 0.4s ease forwards;}
.mcard:hover{border-color:var(--orange)50;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.mcard-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;}
.vico{width:46px;height:46px;border-radius:12px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--blue);}
.vname{font-weight:600;font-size:14px;line-height:1.3; font-family:'Syne',sans-serif;}
.vplate{font-size:11px;color:var(--muted);background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:6px;margin-top:4px;display:inline-block;letter-spacing:.5px;font-family:monospace;}
.msev{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600;margin-left:auto;flex-shrink:0;}
.msev.high{background:#7f1d1d40;color:var(--red);border:1px solid var(--red)30;}
.msev.med{background:#78350f40;color:var(--orange);border:1px solid var(--orange)30;}
.msev.low{background:#14532d40;color:var(--green);border:1px solid var(--green)30;}

.mrow{display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-top:1px solid var(--border)50;}
.mk{color:var(--muted);} .mv{font-weight:500;}
.mv.warn{color:var(--orange);} .mv.ok{color:var(--green);} .mv.crit{color:var(--red);}

.mbar-wrap{margin-top:14px;}
.mbar-info{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500;}
.mbar{height:6px;background:var(--bg3);border-radius:999px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:999px;}

.loading-skeleton {
    background: linear-gradient(90deg, var(--bg3) 25%, var(--bg4) 50%, var(--bg3) 75%);
    background-size: 400% 100%; animation: loading 1.5s infinite; border-radius: 4px; color: transparent !important;
}

/* Mobile Adjustments */
@media (max-width: 768px) {
  .app{grid-template-columns:1fr; grid-template-rows:58px 1fr 64px;}
  .sidebar{grid-row:3; grid-column:1; border-right:none; border-top:1px solid var(--border); flex-direction:row; padding:0 20px; justify-content:space-between; height:64px; z-index:50;}
  .topbar{grid-column:1;}
  .main{grid-column:1; padding: 16px; padding-bottom: 80px;}
  .sidebar-bottom { display:none;}
  .logo-icon{display:none;}
  .nav-btn .tooltip{display:none;}
  .app-sub{display:none;}
  .maint-summary { grid-template-columns: repeat(2, 1fr); }
  .maint-grid { grid-template-columns: 1fr; }
  .live-pill{padding:4px 8px; font-size:10px;}
  .msum-val{font-size:22px;}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="logo-icon" onclick="window.location.href='/dashboard'"><i data-lucide="bus" size="22" color="white"></i></div>
    <button class="nav-btn" onclick="window.location.href='/dashboard'"><i data-lucide="layout-dashboard"></i><span class="tooltip">Dashboard</span></button>
    <button class="nav-btn" onclick="window.location.href='/stations'"><i data-lucide="map-pin"></i><span class="tooltip">Stations</span></button>
    <button class="nav-btn active" onclick="window.location.href='/maintenance'"><i data-lucide="wrench"></i><span class="tooltip">Maintenance</span></button>
    <button class="nav-btn" onclick="window.location.href='/add-data'"><i data-lucide="plus-circle"></i><span class="tooltip">Ajouter</span></button>
    
    <div class="sidebar-bottom">
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Mode jour/nuit"><i data-lucide="moon"></i></button>
      <div class="user-av">A</div>
    </div>
  </nav>

  <!-- TOPBAR -->
  <header class="topbar">
    <div>
      <span class="app-name">TranspoBot</span>
      <span class="app-sub"> — Suivi d'entretien</span>
    </div>
    <div class="topbar-right">
      <div class="live-pill"><div class="dot"></div>Liaison active</div>
      <button class="icon-btn theme-mobile" style="display:none;" onclick="toggleTheme()"><i data-lucide="moon" id="themeBtnMob"></i></button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
       <div class="sec-lbl" style="margin-bottom:0;">Parc en maintenance</div>
       <button class="icon-btn" onclick="fetchMaintenance()" title="Actualiser"><i data-lucide="refresh-cw" size="14"></i></button>
    </div>
    
    <div class="maint-summary">
      <div class="msum"><div class="msum-val" id="sum-total">--</div><div class="msum-lbl">Au Garage</div></div>
      <div class="msum"><div class="msum-val" id="sum-crit" style="color:var(--red)">--</div><div class="msum-lbl">Réparations</div></div>
      <div class="msum"><div class="msum-val" id="sum-mod" style="color:var(--orange)">--</div><div class="msum-lbl">Révisions</div></div>
      <div class="msum"><div class="msum-val" id="sum-cost" style="color:var(--green)">--</div><div class="msum-lbl">Coût Total (FCFA)</div></div>
    </div>
    
    <div class="maint-grid" id="maint-grid">
       <!-- Skeletons -->
       <div class="mcard"><div class="vname loading-skeleton" style="width:50%;height:14px;"></div><br><div class="loading-skeleton" style="width:100%;height:100px;"></div></div>
       <div class="mcard"><div class="vname loading-skeleton" style="width:50%;height:14px;"></div><br><div class="loading-skeleton" style="width:100%;height:100px;"></div></div>
       <div class="mcard"><div class="vname loading-skeleton" style="width:50%;height:14px;"></div><br><div class="loading-skeleton" style="width:100%;height:100px;"></div></div>
    </div>
  </main>
</div>

<script>
lucide.createIcons();
const API = window.location.origin + "/";

// Theme Logic
let isLight = false;
if (localStorage.getItem('theme') === 'light') toggleTheme(true);

function toggleTheme(forceLight = null) {
  isLight = forceLight !== null ? forceLight : !isLight;
  document.documentElement.classList.toggle('light', isLight);
  
  const mIcon = document.querySelector('#themeBtn i');
  if(mIcon) {
     const newIco = document.createElement('i');
     newIco.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
     mIcon.replaceWith(newIco);
  }
  const mobIco = document.querySelector('#themeBtnMob');
  if(mobIco) mobIco.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
  lucide.createIcons();
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

if(window.innerWidth <= 768){
   document.querySelector('.theme-mobile').style.display = 'flex';
}

function formatDate(ds) {
    if(!ds) return 'Indéfini';
    return new Date(ds).toLocaleDateString('fr-FR');
}
function formatMoney(amount) {
    if (!amount) return '0';
    return new Intl.NumberFormat('fr-FR').format(amount);
}

// Procedural visual generation based on data
function getSeverity(typeStr) {
    if(typeStr === 'reparation') return {cls:'high', lbl:'● Réparation', color:'var(--red)'};
    if(typeStr === 'revision') return {cls:'med', lbl:'● Révision', color:'var(--orange)'};
    return {cls:'low', lbl:'● Contrôle', color:'var(--green)'};
}

function calculateProgress(dateDebut, dateFin, statut) {
    if(statut === 'termine') return 100;
    if(!dateDebut || !dateFin) return 40; // fake progress if no end date
    
    const start = new Date(dateDebut).getTime();
    const end = new Date(dateFin).getTime();
    const today = new Date().getTime();
    
    if(today > end) return 99; // almost done
    if(today < start) return 0;
    
    const total = end - start;
    const elapsed = today - start;
    return Math.floor((elapsed / total) * 100);
}

async function fetchMaintenance() {
    const grid = document.getElementById('maint-grid');
    try {
        const res = await fetch(`${API}api/maintenance`);
        if(!res.ok) throw new Error("API Error");
        const data = await res.json();
        
        let repCount = 0;
        let revCount = 0;
        let tCost = 0;
        
        if(!data || data.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted);width:100%;">Vide. Aucun véhicule en maintenance.</div>`;
            document.getElementById('sum-total').textContent = 0;
            document.getElementById('sum-crit').textContent = 0;
            document.getElementById('sum-mod').textContent = 0;
            document.getElementById('sum-cost').textContent = 0;
            return;
        }

        grid.innerHTML = data.map((m, index) => {
            const isDone = m.statut === 'termine';
            if(!isDone) {
                if(m.type_maintenance === 'reparation') repCount++;
                if(m.type_maintenance === 'revision') revCount++;
            }
            if(m.cout) tCost += parseFloat(m.cout);

            const sev = getSeverity(m.type_maintenance);
            const progress = calculateProgress(m.date_debut, m.date_fin, m.statut);
            
            // if completed, style differently
            if(isDone) {
                sev.cls = 'low'; sev.lbl = '● Terminé'; sev.color = 'var(--green)';
            }

            return `
            <div class="mcard" style="animation-delay:${index*0.05}s">
                <div class="mcard-top">
                  <div class="vico"><i data-lucide="wrench"></i></div>
                  <div>
                      <div class="vname">Réf: #${m.id || 'N/A'}</div>
                      <span class="vplate">${m.immatriculation || 'Inconnu'}</span>
                  </div>
                  <span class="msev ${sev.cls}">${sev.lbl}</span>
                </div>
                <div class="mrow"><span class="mk">Diagnostic</span><span class="mv">${m.description || '—'}</span></div>
                <div class="mrow"><span class="mk">Date d'entrée</span><span class="mv">${formatDate(m.date_debut)}</span></div>
                <div class="mrow"><span class="mk">${isDone ? 'Date sortie' : 'Sortie estimée'}</span><span class="mv ${isDone ? 'ok' : 'warn'}">${formatDate(m.date_fin)}</span></div>
                <div class="mrow"><span class="mk">Coût</span><span class="mv">${formatMoney(m.cout)} FCFA</span></div>
                <div class="mbar-wrap">
                  <div class="mbar-info"><span>${isDone ? 'Terminé' : 'Progression estimée'}</span><span>${progress}%</span></div>
                  <div class="mbar"><div class="mbar-fill" style="width:${progress}%; background:${sev.color}"></div></div>
                </div>
            </div>`;
        }).join('');
        
        lucide.createIcons();
        
        const activeMaint = data.filter(d => d.statut !== 'termine').length;
        document.getElementById('sum-total').textContent = activeMaint;
        document.getElementById('sum-crit').textContent = repCount;
        document.getElementById('sum-mod').textContent = revCount;
        document.getElementById('sum-cost').textContent = formatMoney(tCost);

    } catch (e) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--red);width:100%;">Erreur de chargement des maintenances.</div>`;
    }
}

document.addEventListener("DOMContentLoaded", () => {
    fetchMaintenance();
});
</script>
</body>
</html>
