<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TranspoBot — Ajouter Données</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0B0F1A;--bg2:#111827;--bg3:#1a2235;--bg4:#0d1526;
  --blue:#2563EB;--blue2:#3B82F6;--accent:#38BDF8;
  --green:#22C55E;--orange:#F59E0B;--red:#EF4444;
  --text:#F1F5F9;--muted:#64748B;--border:#1E293B;--card:#141D2E;
  --radius:14px;
}
.light{
  --bg:#F0F4FA;--bg2:#FFFFFF;--bg3:#E8EEF8;--bg4:#F8FAFF;
  --blue:#2563EB;--blue2:#3B82F6;--accent:#0284C7;
  --green:#16A34A;--orange:#D97706;--red:#DC2626;
  --text:#0F172A;--muted:#64748B;--border:#CBD5E1;--card:#FFFFFF;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;}

/* ===== LAYOUT ===== */
.app{display:grid;grid-template-columns:64px 1fr;grid-template-rows:58px 1fr;height:100vh;overflow:hidden;}
@media (max-width: 768px) {
  html,body{height:100%;overflow:hidden;}
}

/* ===== SIDEBAR ===== */
.sidebar{
  grid-row:1/3;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:6px;
  transition:background .3s;z-index:20;
}
.logo-icon{width:40px;height:40px;background:var(--blue);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:16px;flex-shrink:0;cursor:pointer;}
.nav-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;color:var(--muted);border:none;background:none;transition:all .2s;position:relative;}
.nav-btn:hover{background:var(--bg3);color:var(--blue2);}
.nav-btn.active{background:var(--bg3);color:var(--blue2);box-shadow:0 0 0 1.5px var(--blue2)40;}
.nav-btn .tooltip{position:absolute;left:52px;background:#1e293b;color:#f1f5f9;font-size:11px;padding:4px 10px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;}
.nav-btn:hover .tooltip{opacity:1;}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px;}
.theme-toggle{width:40px;height:40px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.theme-toggle:hover{background:var(--blue);border-color:var(--blue);color:white;}
.user-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#2563EB,#38BDF8);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:white;}

/* ===== TOPBAR ===== */
.topbar{
  grid-column:2;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 22px;gap:16px;transition:background .3s;
}
.app-name{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.app-sub{font-size:11px;color:var(--muted);margin-left:2px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.live-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:var(--bg3);padding:5px 12px;border-radius:999px;border:1px solid var(--green)40;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.icon-btn{width:36px;height:36px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* ===== MAIN CONTENT ===== */
.main{grid-column:2;display:flex;flex-direction:column;overflow-y:auto;padding:24px;padding-bottom:100px;scroll-behavior:smooth;}
.sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--muted);font-weight:600;margin-bottom:12px;}

/* TABS */
.tab-row { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
.tab-row::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 8px 20px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--card); color: var(--muted); font-size: 13px; font-family: 'Outfit', sans-serif;
  cursor: pointer; transition: all 0.2s; white-space: nowrap; font-weight: 500;
}
.tab-btn.active {
  background: var(--blue); color: white; border-color: var(--blue); box-shadow: 0 4px 12px rgba(37,99,235,0.25);
}
.tab-btn:hover:not(.active) { background: var(--bg3); color: var(--text); border-color: var(--blue2); }

/* FORMS */
.fcard { background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:800px; }
.fcard-hd { font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px; }

.form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.c-input {
    width: 100%; background: var(--bg3); border: 1.5px solid var(--border);
    padding: 12px 14px; border-radius: 10px; color: var(--text);
    font-size: 13px; font-family: 'Outfit', sans-serif; transition: all 0.3s; outline: none;
}
.c-input:focus { border-color: var(--blue2); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
.c-input::placeholder { color: var(--muted); }
select.c-input { appearance: none; background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 14px top 50%; background-size: 10px auto; padding-right: 30px; }

.form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
.btn {
    padding: 10px 20px; border-radius: 10px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; border: none; display: inline-flex; align-items: center; gap: 8px; font-family: 'Outfit', sans-serif;
}
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: var(--blue2); transform: translateY(-1px); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { background: var(--bg4); }
.btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* Alert messages */
#messages { max-width: 800px; margin-bottom: 20px; }
.msg-alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 10px; animation: slideDown 0.3s; margin-bottom: 10px; }
@keyframes slideDown { from {opacity:0; transform:translateY(-10px);} to {opacity:1; transform:translateY(0);} }
.msg-alert.success { background: #14532d40; color: #4ade80; border: 1px solid var(--green)30; }
.msg-alert.error { background: #7f1d1d40; color: #ef4444; border: 1px solid var(--red)30; }

/* Mobile Adjustments */
@media (max-width: 768px) {
  .app{grid-template-columns:1fr; grid-template-rows:58px 1fr 64px;}
  .sidebar{grid-row:3; grid-column:1; border-right:none; border-top:1px solid var(--border); flex-direction:row; padding:0 20px; justify-content:space-between; height:64px; z-index:50;}
  .topbar{grid-column:1;}
  .main{grid-column:1; padding: 16px; padding-bottom: 80px;}
  .sidebar-bottom { display:none;}
  .logo-icon{display:none;}
  .nav-btn .tooltip{display:none;}
  .app-sub{display:none;}
  .fcard{max-width:100%;}
  .form-grid { grid-template-columns: 1fr; }
  .form-actions { justify-content: stretch; flex-direction: column-reverse; }
  .form-actions .btn { width: 100%; justify-content: center; }
  .live-pill{padding:4px 8px; font-size:10px;}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="logo-icon" onclick="window.location.href='/dashboard'"><i data-lucide="bus" size="22" color="white"></i></div>
    <button class="nav-btn" onclick="window.location.href='/dashboard'"><i data-lucide="layout-dashboard"></i><span class="tooltip">Dashboard</span></button>
    <button class="nav-btn" onclick="window.location.href='/stations'"><i data-lucide="map-pin"></i><span class="tooltip">Stations</span></button>
    <button class="nav-btn" onclick="window.location.href='/maintenance'"><i data-lucide="wrench"></i><span class="tooltip">Maintenance</span></button>
    <button class="nav-btn active" id="nav-add" onclick="window.location.href='/add-data'"><i data-lucide="plus-circle"></i><span class="tooltip">Ajouter</span></button>

    <div class="sidebar-bottom">
      <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Mode jour/nuit"><i data-lucide="moon"></i></button>
      <div class="user-av" id="user-initials" title="" style="cursor:default;">?</div>
      <button class="nav-btn" onclick="logout()" title="Déconnexion" style="color:var(--red)"><i data-lucide="log-out"></i><span class="tooltip">Déconnexion</span></button>
    </div>
  </nav>

  <!-- TOPBAR -->
  <header class="topbar">
    <div>
      <span class="app-name">TranspoBot</span>
      <span class="app-sub"> — Saisie de données</span>
    </div>
    <div class="topbar-right">
      <div class="live-pill"><div class="dot"></div>Liaison active</div>
      <button class="icon-btn theme-mobile" style="display:none;" onclick="toggleTheme()"><i data-lucide="moon" id="themeBtnMob"></i></button>
      <button class="icon-btn" onclick="logout()" title="Déconnexion" style="color:var(--red);"><i data-lucide="log-out" size="15"></i></button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <div class="sec-lbl">Insertion</div>

    <!-- TABS -->
    <div class="tab-row">
        <button class="tab-btn active" id="btn-tab-vehicle" onclick="showTab('vehicle')"><i data-lucide="truck" size="14" style="vertical-align:bottom; margin-right:4px;"></i> Véhicule</button>
        <button class="tab-btn" id="btn-tab-driver" onclick="showTab('driver')"><i data-lucide="user" size="14" style="vertical-align:bottom; margin-right:4px;"></i> Chauffeur</button>
        <button class="tab-btn" id="btn-tab-line" onclick="showTab('line')"><i data-lucide="route" size="14" style="vertical-align:bottom; margin-right:4px;"></i> Ligne</button>
        <button class="tab-btn" id="btn-tab-trip" onclick="showTab('trip')"><i data-lucide="navigation" size="14" style="vertical-align:bottom; margin-right:4px;"></i> Trajet</button>
        <button class="tab-btn" id="btn-tab-maint" onclick="showTab('maint')"><i data-lucide="wrench" size="14" style="vertical-align:bottom; margin-right:4px;"></i> Maintenance</button>
    </div>

    <!-- MESSAGES -->
    <div id="messages"></div>

    <!-- FORM: VEHICLE -->
    <div id="tab-vehicle" class="view-tab fcard">
      <div class="fcard-hd"><i data-lucide="truck" color="var(--blue)"></i> Nouveau Véhicule</div>
      <form id="vehicle-form" onsubmit="submitForm(event, 'vehicles', 'vehicle-form')">
          <div class="form-grid">
              <div class="form-group">
                  <label>Immatriculation *</label>
                  <input type="text" class="c-input" name="immatriculation" placeholder="Ex: DK-1234-AB" required>
              </div>
              <div class="form-group">
                  <label>Type *</label>
                  <select class="c-input" name="type" required>
                      <option value="">Sélectionner</option>
                      <option value="bus">Bus</option>
                      <option value="minibus">Minibus</option>
                      <option value="taxi">Taxi</option>
                  </select>
              </div>
              <div class="form-group">
                  <label>Capacité *</label>
                  <input type="number" class="c-input" name="capacite" placeholder="Ex: 60" required>
              </div>
              <div class="form-group">
                  <label>Date Acquisition</label>
                  <input type="date" class="c-input" name="date_acquisition">
              </div>
              <div class="form-group" style="grid-column: 1 / -1;">
                  <label>Statut</label>
                  <select class="c-input" name="statut">
                      <option value="actif">Actif</option>
                      <option value="maintenance">Maintenance</option>
                  </select>
              </div>
          </div>
          <div class="form-actions">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('vehicle-form').reset()">Réinitialiser</button>
              <button type="submit" class="btn btn-primary"><i data-lucide="save" size="16"></i> Enregistrer</button>
          </div>
      </form>
    </div>

    <!-- FORM: DRIVER -->
    <div id="tab-driver" class="view-tab fcard" style="display:none;">
      <div class="fcard-hd"><i data-lucide="user" color="var(--blue)"></i> Nouveau Chauffeur</div>
      <form id="driver-form" onsubmit="submitForm(event, 'drivers', 'driver-form')">
          <div class="form-grid">
              <div class="form-group">
                  <label>Prénom *</label>
                  <input type="text" class="c-input" name="prenom" placeholder="Prénom" required>
              </div>
              <div class="form-group">
                  <label>Nom *</label>
                  <input type="text" class="c-input" name="nom" placeholder="Nom" required>
              </div>
              <div class="form-group">
                  <label>Téléphone</label>
                  <input type="tel" class="c-input" name="telephone" placeholder="+221...">
              </div>
              <div class="form-group">
                  <label>Numéro de permis *</label>
                  <input type="text" class="c-input" name="numero_permis" placeholder="N° de permis" required>
              </div>
              <div class="form-group">
                  <label>Catégorie</label>
                  <select class="c-input" name="categorie_permis">
                      <option value="B">B</option>
                      <option value="D">D</option>
                  </select>
              </div>
          </div>
          <div class="form-actions">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('driver-form').reset()">Réinitialiser</button>
              <button type="submit" class="btn btn-primary"><i data-lucide="save" size="16"></i> Enregistrer</button>
          </div>
      </form>
    </div>

    <!-- FORM: LINE -->
    <div id="tab-line" class="view-tab fcard" style="display:none;">
      <div class="fcard-hd"><i data-lucide="route" color="var(--blue)"></i> Nouvelle Ligne</div>
      <form id="line-form" onsubmit="submitForm(event, 'lines', 'line-form')">
          <div class="form-grid">
              <div class="form-group">
                  <label>Code *</label>
                  <input type="text" class="c-input" name="code" placeholder="Ex: L1" required>
              </div>
              <div class="form-group">
                  <label>Nom</label>
                  <input type="text" class="c-input" name="nom" placeholder="Nom de ligne">
              </div>
              <div class="form-group">
                  <label>Origine *</label>
                  <input type="text" class="c-input" name="origine" required>
              </div>
              <div class="form-group">
                  <label>Destination *</label>
                  <input type="text" class="c-input" name="destination" required>
              </div>
              <div class="form-group">
                  <label>Distance (km)</label>
                  <input type="number" step="0.1" class="c-input" name="distance_km">
              </div>
          </div>
          <div class="form-actions">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('line-form').reset()">Réinitialiser</button>
              <button type="submit" class="btn btn-primary"><i data-lucide="save" size="16"></i> Enregistrer</button>
          </div>
      </form>
    </div>

    <!-- FORM: TRIP -->
    <div id="tab-trip" class="view-tab fcard" style="display:none;">
      <div class="fcard-hd"><i data-lucide="navigation" color="var(--blue)"></i> Nouveau Trajet</div>
      <form id="trip-form" onsubmit="submitForm(event, 'trips', 'trip-form')">
          <div class="form-grid">
              <div class="form-group">
                  <label>Ligne *</label>
                  <select class="c-input" id="sel-lignes" name="ligne_id" required><option value="">Chargement...</option></select>
              </div>
              <div class="form-group">
                  <label>Chauffeur *</label>
                  <select class="c-input" id="sel-chauffeurs" name="chauffeur_id" required><option value="">Chargement...</option></select>
              </div>
              <div class="form-group">
                  <label>Véhicule *</label>
                  <select class="c-input" id="sel-vehicules" name="vehicule_id" required><option value="">Chargement...</option></select>
              </div>
              <div class="form-group">
                  <label>Heure de départ *</label>
                  <input type="datetime-local" class="c-input" name="date_heure_depart" required>
              </div>
              <div class="form-group">
                  <label>Statut</label>
                  <select class="c-input" name="statut">
                      <option value="planifie">Planifié</option>
                      <option value="en_cours">En cours</option>
                      <option value="termine">Terminé</option>
                  </select>
              </div>
          </div>
          <div class="form-actions">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('trip-form').reset()">Réinitialiser</button>
              <button type="submit" class="btn btn-primary"><i data-lucide="save" size="16"></i> Enregistrer</button>
          </div>
      </form>
    </div>

    <!-- FORM: MAINTENANCE -->
    <div id="tab-maint" class="view-tab fcard" style="display:none;">
      <div class="fcard-hd"><i data-lucide="wrench" color="var(--blue)"></i> Nouvelle Maintenance</div>
      <form id="maintenance-form" onsubmit="submitForm(event, 'maintenance', 'maintenance-form')">
          <div class="form-grid">
              <div class="form-group">
                  <label>Véhicule *</label>
                  <select class="c-input" id="sel-vehicules-m" name="vehicule_id" required><option value="">Chargement...</option></select>
              </div>
              <div class="form-group">
                  <label>Type *</label>
                  <select class="c-input" name="type_maintenance" required>
                      <option value="revision">Révision</option>
                      <option value="reparation">Réparation</option>
                      <option value="controle">Contrôle</option>
                  </select>
              </div>
              <div class="form-group">
                  <label>Coût (FCFA)</label>
                  <input type="number" class="c-input" name="cout">
              </div>
              <div class="form-group">
                  <label>Date Début *</label>
                  <input type="date" class="c-input" name="date_debut" required>
              </div>
              <div class="form-group" style="grid-column: 1 / -1;">
                  <label>Description *</label>
                  <textarea class="c-input" name="description" rows="3" required></textarea>
              </div>
          </div>
          <div class="form-actions">
              <button type="button" class="btn btn-secondary" onclick="document.getElementById('maintenance-form').reset()">Réinitialiser</button>
              <button type="submit" class="btn btn-primary"><i data-lucide="save" size="16"></i> Enregistrer</button>
          </div>
      </form>
    </div>

  </main>
</div>

<script>
// ===== AUTH =====
const _token = localStorage.getItem('tb_token');
const _user  = JSON.parse(localStorage.getItem('tb_user') || 'null');
if(!_token || !_user){ window.location.replace('/login'); }
// Le président n'a pas accès à cette page
if(_user && _user.role === 'president'){ window.location.replace('/dashboard'); }

function logout(){
  fetch('/api/auth/logout',{method:'POST',headers:{'Authorization':'Bearer '+_token}}).catch(()=>{});
  localStorage.removeItem('tb_token'); localStorage.removeItem('tb_user');
  window.location.href='/login';
}

function authFetch(url, opts={}){
  return fetch(url, {...opts, headers:{...(opts.headers||{}), 'Authorization':'Bearer '+_token}});
}

lucide.createIcons();
const API = window.location.origin + "/";

// Theme Logic
let isLight = false;
if (localStorage.getItem('theme') === 'light') toggleTheme(true);

function toggleTheme(forceLight = null) {
  isLight = forceLight !== null ? forceLight : !isLight;
  document.documentElement.classList.toggle('light', isLight);
  
  const mIcon = document.querySelector('#themeBtn i');
  if(mIcon) {
     const newIco = document.createElement('i');
     newIco.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
     mIcon.replaceWith(newIco);
  }
  const mobIco = document.querySelector('#themeBtnMob');
  if(mobIco) mobIco.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
  lucide.createIcons();
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
}

if(window.innerWidth <= 768){
   document.querySelector('.theme-mobile').style.display = 'flex';
}

// Tab Logic
function showTab(tabName) {
  document.querySelectorAll('.view-tab').forEach(tab => tab.style.display = 'none');
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('tab-' + tabName).style.display = 'block';
  document.getElementById('btn-tab-' + tabName).classList.add('active');
}

// Alerts
function showMsg(type, text) {
    const box = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = `msg-alert ${type}`;
    msg.innerHTML = `<i data-lucide="${type==='success' ? 'check-circle' : 'alert-circle'}" size="18"></i> ${text}`;
    box.appendChild(msg);
    lucide.createIcons();
    setTimeout(() => msg.remove(), 5000);
}

// Data loaders for selects
async function loadSelects() {
    try {
        const [linesRes, drvRes, vehRes] = await Promise.all([
            authFetch(`${API}api/lines`), authFetch(`${API}api/drivers`), authFetch(`${API}api/vehicles`)
        ]);
        
        if(linesRes.ok) {
            const lines = await linesRes.json();
            document.getElementById('sel-lignes').innerHTML = '<option value="">Sélectionner</option>' + 
                lines.map(l => `<option value="${l.id}">${l.code} - ${l.origine} > ${l.destination}</option>`).join('');
        }
        
        if(drvRes.ok) {
            const drvs = await drvRes.json();
            document.getElementById('sel-chauffeurs').innerHTML = '<option value="">Sélectionner</option>' + 
                drvs.map(d => `<option value="${d.id}">${d.prenom} ${d.nom}</option>`).join('');
        }
        
        if(vehRes.ok) {
            const vehs = await vehRes.json();
            const vHtml = '<option value="">Sélectionner</option>' + 
                vehs.map(v => `<option value="${v.id}">${v.immatriculation} (${v.type})</option>`).join('');
            document.getElementById('sel-vehicules').innerHTML = vHtml;
            document.getElementById('sel-vehicules-m').innerHTML = vHtml;
        }
    } catch(e) {
        showMsg('error', 'Erreur lors du chargement des options des formulaires.');
    }
}

// Form Submission
async function submitForm(e, endpoint, formId) {
    e.preventDefault();
    const btn = e.target.querySelector('button[type="submit"]');
    const ogHtml = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span style="font-size:12px">Enregistrement...</span>`;
    
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData);
    
    try {
        const res = await authFetch(`${API}api/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if(res.ok) {
            showMsg('success', 'Ajour effectué avec succès !');
            document.getElementById(formId).reset();
            if(endpoint !== 'trips' && endpoint !== 'maintenance') loadSelects(); // reload selects if we added new dependencies
        } else {
            const err = await res.json();
            showMsg('error', err.detail || 'Erreur lors de l\'ajout.');
        }
    } catch(err) {
        showMsg('error', 'Erreur réseau.');
    } finally {
        btn.disabled = false;
        btn.innerHTML = ogHtml;
        lucide.createIcons();
    }
}

document.addEventListener("DOMContentLoaded", loadSelects);

// Afficher initiale
if(_user){ const ini=document.getElementById('user-initials'); if(ini){ini.textContent=_user.username.charAt(0).toUpperCase();ini.title=_user.display||_user.username;} }
</script>
